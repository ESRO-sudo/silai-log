<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सिलाई उत्पादन लॉग</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="app-header">
        <div class="header-info">
            <span id="headerStaff">सिलाई लॉग</span>
        </div>
        <div class="menu-container">
            <button id="menuBtn" class="menu-btn">⫶</button>
            <div id="dropdownMenu" class="dropdown-content hidden">
                <a href="#" id="menuEditProfile">👤 प्रोफाइल बदलें</a>
                <hr>
                <div class="menu-filter-box">
                    <label>📅 महीना चुनें:</label>
                    <select id="reportMonthFilter"></select>
                </div>
                <a href="#" id="menuDownloadExcel">📥 Excel डाउनलोड करें</a>
                <hr>
                <a href="#" id="menuInstallApp">📲 ऐप इंस्टॉल करें</a>
                <a href="#" id="menuShareApp">🔗 ऐप शेयर करें</a>
                <a href="#" id="menuHelp">❓ मदद (Help)</a>
            </div>
        </div>
    </div>

    <div class="container" id="loginBlock">
        <h2>प्रोफाइल सेटअप</h2>
        <div class="input-group">
            <label>स्टाफ का नाम (Staff Name):</label>
            <input type="text" id="staffName" placeholder="जैसे: SANJAY KUMAR">
        </div>
        <div class="input-group">
            <label>कार्ड नंबर (Card No):</label>
            <input type="text" id="cardNo" placeholder="जैसे: 9562">
        </div>
        <div class="input-group">
            <label>मोबाइल नंबर (Data Safety):</label>
            <input type="number" id="userMobile" placeholder="जैसे: 9650987245">
        </div>
        <button id="saveProfileBtn">Profile Save & Sync</button>
    </div>

    <div class="container hidden" id="mainApp">
        
        <h2>Daily Entry (सिलाई लॉग)</h2>
        
        <input type="hidden" id="activity" value="STITCHING">

        <div class="input-group">
            <label>तारीख (Date):</label>
            <input type="date" id="entryDate">
        </div>

        <div class="input-group">
            <label>आकार/माप (Size):</label>
            <input type="text" id="itemSize" placeholder="जैसे: 70 Inch Round">
        </div>

        <div class="input-group">
            <label>कुल मात्रा (Total Pcs):</label>
            <input type="number" id="quantity" min="1" placeholder="0">
        </div>

        <div class="input-group">
            <label>रेट (1 Pcs Rate):</label>
            <input type="number" step="0.01" min="0" id="rate" placeholder="0.00">
        </div>

        <button id="saveEntryBtn">Data Entry Save Karein</button>
        
        <div id="monthlyTotalBox" style="margin-top: 20px; background: #27ae60; color: white; padding: 12px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <span style="font-size: 14px; font-weight: bold; display: block; opacity: 0.9;">आज की कुल कमाई (Today's Total):</span>
            <span id="grandTotalSalary" style="font-size: 26px; font-weight: 800; display: block; margin-top: 3px;">₹0.00</span>
        </div>
        
        <h3>📊 आज का डेटा लिस्ट (Today's History)</h3>
        <div class="table-wrapper">
            <table id="todayTable">
                <thead>
                    <tr>
                        <th>तारीख</th>
                        <th>साइज</th>
                        <th>मात्रा</th>
                        <th>रेट</th>
                        <th>टोटल</th>
                        <th>एक्शन</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
